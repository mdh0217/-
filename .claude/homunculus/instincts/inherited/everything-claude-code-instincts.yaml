# Everything Claude Code 테스트 러너

## 행동 지침

저장소의 기존 Node 기반 테스트 흐름을 사용하세요: 먼저 대상 `*.test.js` 파일을 실행하고, 더 넓은 검증에는 `node tests/run-all.js` 또는 `npm test`를 사용하세요.

## 근거

- 저장소는 `tests/run-all.js`를 중앙 테스트 오케스트레이터로 사용합니다.
- 테스트 파일은 훅, CI, 통합 커버리지 전반에 걸쳐 `*.test.js` 패턴을 따릅니다.

