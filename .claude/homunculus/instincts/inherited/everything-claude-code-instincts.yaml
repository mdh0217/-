# Everything Claude Code 크로스 플랫폼 동기화

## 행동 지침

루트 저장소를 진실의 원천(source of truth)으로 취급하고, 기능이 실제로 존재하는 경우에만 `.cursor/`, `.codex/`, `.opencode/`, `.agents/`에 변경사항을 미러링하세요.

## 근거

- ECC는 겹치지만 동일하지 않은 파일을 가진 여러 플랫폼별 표면을 유지합니다.
- 가장 안전한 워크플로우는 루트 먼저 작업한 후 명시적으로 동등성을 업데이트하는 것입니다.

