# Everything Claude Code JS 파일 이름 규칙

## 행동 지침

JavaScript와 TypeScript 모듈 파일명에는 camelCase를 사용하고, 스킬 또는 커맨드 디렉토리는 kebab-case를 유지하세요.

## 근거

- `scripts/`와 테스트 헬퍼 대부분이 camelCase 모듈 이름을 사용합니다.
- `skills/`와 `commands/` 디렉토리는 일관되게 kebab-case를 사용합니다.

