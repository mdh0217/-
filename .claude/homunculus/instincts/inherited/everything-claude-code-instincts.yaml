# Everything Claude Code 커밋 길이

## 행동 지침

커밋 제목은 저장소 기준인 약 70자에 맞게 간결하게 유지하세요.

## 근거

- 최근 히스토리가 ~50자가 아닌 ~70자 근처에 집중되어 있습니다.
- 짧고 설명적인 제목은 릴리즈 노트와 PR 요약에서 잘 읽힙니다.

