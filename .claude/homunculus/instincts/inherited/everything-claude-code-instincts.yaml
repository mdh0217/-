# Everything Claude Code 컨벤셔널 커밋

## 행동 지침

`feat:`, `fix:`, `docs:`, `test:`, `chore:`, `refactor:` 등의 컨벤셔널 커밋 접두사를 사용하세요.

## 근거

- 메인라인 히스토리가 일관되게 컨벤셔널 커밋 제목을 사용합니다.
- 릴리즈와 체인지로그 자동화가 읽기 쉬운 커밋 분류를 필요로 합니다.

