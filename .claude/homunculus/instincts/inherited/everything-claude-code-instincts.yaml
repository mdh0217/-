# Everything Claude Code 학습 큐레이션

## 행동 지침

대량 생성되거나 중복되거나 모순되는 instincts보다 소수의 정확한 instincts를 선호하세요.

## 근거

- 자동 생성된 instinct 덤프는 규칙을 중복시키거나, 트리거를 너무 넓히거나, 플레이스홀더 감지기 출력을 보존할 수 있습니다.
- 큐레이션된 instincts는 지속적인 학습 워크플로우에서 가져오고, 감사하고, 신뢰하기가 더 쉽습니다.
