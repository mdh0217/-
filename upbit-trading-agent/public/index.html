<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upbit Trading Agent | PRO</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { --bg: #0b0e14; --card-bg: #161b22; --accent: #00ff94; --danger: #ff4d4d; --text-main: #f8fafc; --text-sub: #8b949e; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding-bottom: 40px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); display: inline-block; margin-right: 8px; }
        .hero { text-align: left; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .hero .label { color: var(--text-sub); font-size: 14px; margin-bottom: 8px; }
        .hero .balance { font-size: 36px; font-weight: 700; color: var(--text-main); }
        .section-title { font-size: 15px; font-weight: 700; color: var(--accent); margin: 30px 0 15px; display: flex; align-items: center; }
        .section-title::before { content: ""; width: 4px; height: 14px; background: var(--accent); margin-right: 8px; border-radius: 2px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 24px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .symbol { font-size: 22px; font-weight: 700; }
        .profit { font-weight: 700; font-size: 17px; }
        .plus { color: var(--accent); }
        .minus { color: var(--danger); }
        .data-row { display: flex; justify-content: space-between; margin-top: 10px; font-size: 15px; }
        .data-label { color: var(--text-sub); }
        .watch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .watch-item { background: var(--card-bg); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .watch-symbol { font-weight: 700; font-size: 14px; }
        .watch-tag { font-size: 10px; background: rgba(0,255,148,0.1); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="font-size: 13px; font-weight: 800; letter-spacing: 1px; color: var(--text-sub);">UPBIT AI AGENT</div>
            <div style="font-size: 12px; color: var(--text-sub);"><span class="status-dot"></span>LIVE MONITORING</div>
        </header>
        
        <section class="hero">
            <div class="label">보유 현금 (KRW)</div>
            <div class="balance" id="total-balance">₩ 0</div>
        </section>

        <div class="section-title">보유 중인 포지션</div>
        <div id="position-container"></div>

        <div class="section-title">실시간 추적 종목 (8)</div>
        <div class="watch-grid" id="watch-container"></div>
    </div>

    <script>
        const watchList = ['BTC', 'ETH', 'SOL', 'XRP', 'DOGE', 'ADA', 'SUI', 'ETC'];

        async function fetchData() {
            try {
                // 여러 경로를 시도하여 데이터를 반드시 가져옵니다.
                const response = await fetch('/status').catch(() => fetch('/api/status'));
                const data = await response.json();
                
                if (data && data.balance) {
                    render(data);
                }
            } catch (e) { console.log("데이터 연결 대기 중..."); }
        }

        function render(data) {
            // 1. 잔고 업데이트
            document.getElementById('total-balance').innerText = '₩ ' + Number(data.balance.krw_available).toLocaleString();

            // 2. 보유 포지션 렌더링
            const posContainer = document.getElementById('position-container');
            if (!data.open_positions || data.open_positions.length === 0) {
                posContainer.innerHTML = '<div style="color: var(--text-sub); text-align: center; padding: 20px; font-size: 14px;">현재 진입한 포지션이 없습니다.</div>';
            } else {
                posContainer.innerHTML = data.open_positions.map(p => {
                    const symbol = p.market.split('-')[1] || p.market;
                    const profit = p.current_price ? ((p.current_price - p.avg_price) / p.avg_price * 100).toFixed(2) : "0.00";
                    return `
                        <div class="card">
                            <div class="card-header">
                                <span class="symbol">${symbol}</span>
                                <span class="profit ${profit >= 0 ? 'plus' : 'minus'}">${profit >= 0 ? '+' : ''}${profit}%</span>
                            </div>
                            <div class="data-row"><span class="data-label">평균 매수가</span><span>₩ ${Number(p.avg_price).toLocaleString()}</span></div>
                            <div class="data-row"><span class="data-label">현재 가격</span><span>₩ ${Number(p.current_price || 0).toLocaleString()}</span></div>
                            <div class="data-row"><span class="data-label">투자 금액</span><span>₩ ${Number(p.total_invested).toLocaleString()}</span></div>
                            <div class="data-row"><span class="data-label">진행 단계</span><span style="color:var(--accent)">DCA ${p.dca_level}단계</span></div>
                        </div>`;
                }).join('');
            }

            // 3. 8개 추적 종목 리스트 렌더링
            const watchContainer = document.getElementById('watch-container');
            watchContainer.innerHTML = watchList.map(sym => `
                <div class="watch-item">
                    <span class="watch-symbol">${sym}</span>
                    <span class="watch-tag">추적 중</span>
                </div>
            `).join('');
        }

        setInterval(fetchData, 2000);
        fetchData();
    </script>
</body>
</html>
